<section class="min-h-screen bg-gray-50 py-8 px-6">
    <div class="max-w-6xl mx-auto">
  
      @if (!productsLoaded) {
        <p class="text-center mt-10 text-gray-500">Loading products...</p>
      }
      @else if (products.length === 0) {
        <p class="text-center mt-10 text-gray-500 font-semibold">
          No products found in this category
        </p>
      }
      @else {
        <div class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
          @for (product of products; track product._id) {
            <div
              class="bg-white rounded-2xl shadow p-4 hover:shadow-lg transition group cursor-pointer relative"
              (click)="goToProductDetails(product._id)"
            >
              <img [src]="product.imageCover" [alt]="product.title" class="h-40 w-full object-contain" />
          
              <h3 class="mt-3 text-sm font-semibold line-clamp-2">
                {{ product.title }}
              </h3>
          
              <p class="mt-2 text-lg font-bold text-[#0aad0a]">
                {{ product.price }} EGP
              </p>
          
              
              <button
                class="absolute left-4 right-4 bottom-4 bg-[#0aad0a] text-white py-2 rounded-xl
                       opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0
                       transition-all duration-300"
                (click)="addToCart(product._id, $event)"
              >
                + Add to Cart
              </button>
            </div>
          }
        </div>
      }
  
      @if (productsLoaded && total > pageSize) {
        <div class="flex justify-center mt-10">
          <pagination-controls
            [responsive]="true"
            [maxSize]="0"
            [autoHide]="true"
            (pageChange)="getCategoryProducts($event)">
          </pagination-controls>
        </div>
      }
  
    </div>
  </section>
